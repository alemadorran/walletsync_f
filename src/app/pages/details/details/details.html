<div class="p-6 flex flex-col gap-10">

    <span class="m-auto">
        <h1 class="text-3xl font-bold">Detalles de Movimientos</h1>
        <p class="text-base-content/70">Selecciona un año para ver los movimientos asociados agrupados por mes.</p>
    </span>

    <ng-container *ngIf="yearNotSelected">
        <div role="alert" class="alert alert-warning shadow-lg">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                class="h-6 w-6 shrink-0 stroke-current">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <span>Selecciona un año para cargar los movimientos.</span>
        </div>
    </ng-container>

    <select class="select m-auto" (change)="onYearChange($event)">
        <option disabled selected>Selecciona un año</option>
        <option>2024</option>
        <option>2025</option>
        <option>2026</option>
    </select>

    <select class="select m-auto" (change)="onTypeChange($event)">
        <option disabled selected>Selecciona el tipo</option>
        <option>Ingresos</option>
        <option>Gastos</option>
        <option>Todos</option>
    </select>

    <ng-container *ngIf="associatedPaymentsByYear$ | async as associatedPaymentsByYear">
        <div class="container mx-auto p-4 max-w-5xl">
            <div class="collapse collapse-arrow bg-base-200 mb-4 border border-base-300 shadow-sm rounded-box">
                <input type="checkbox" />

                <div class="collapse-title text-xl font-medium flex flex-wrap justify-between items-center gap-4">

                    <div class="flex items-center gap-3">
                        <span class="capitalize">{{ year }}</span>
                    </div>
                </div>

                <div class="collapse-content bg-base-100">

                    <div *ngFor="let monthData of associatedPaymentsByYear?.associatedSantanderPaymentByMonthDTOS"
                        class="collapse collapse-arrow bg-base-200 mb-4 mt-4 border border-base-300 shadow-sm rounded-box">
                        <input type="checkbox" />

                        <div
                            class="collapse-title text-xl font-medium flex flex-wrap justify-between items-center gap-4">

                            <div class="flex items-center gap-3">
                                <span class="capitalize">{{ monthData.month | monthNamePipe }}</span>
                            </div>
                        </div>

                        <div class="collapse-content bg-base-100">
                            <app-payment-list-component
                                [associatedPayments]="monthData.associatedSantanderPaymentDTOS"></app-payment-list-component>
                        </div>

                    </div>

                </div>
            </div>
        </div>
    </ng-container>


    <app-piechart *ngIf=" yearReportDTO$ | async as yearReportDTO" [data]="yearReportDTO.totalAmountByCategoriesDTOS"
        [categoryType]="yearReportDTO.categoryType">
    </app-piechart>

</div>
