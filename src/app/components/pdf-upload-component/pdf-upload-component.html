<div class="card w-full max-w-xl bg-base-100 shadow-xl mx-auto mt-10">
  <div class="card-body">
    <h2 class="card-title text-2xl font-bold mb-4">Importar Movimientos Santander</h2>
    <p class="text-sm opacity-70 mb-6">Selecciona el extracto PDF descargado de la web del banco.</p>

    <div class="form-control w-full">
      <label class="label">
        <span class="label-text">Archivo PDF</span>
      </label>
      <input type="file" 
             (change)="onFileSelected($event)"
             accept="application/pdf"
             class="file-input file-input-bordered file-input-primary w-full" 
             [disabled]="loading" />
    </div>

    <div *ngIf="message" class="mt-6">
      <div class="alert shadow-lg" [ngClass]="status === 'success' ? 'alert-success' : 'alert-error'">
        <svg xmlns="http://www.w3.org/2000/svg" class="stroke-current shrink-0 h-6 w-6" fill="none" viewBox="0 0 24 24">
          <path *ngIf="status === 'success'" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
          <path *ngIf="status === 'error'" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <span>{{ message }}</span>
      </div>
    </div>

    <div class="card-actions justify-end mt-8">
      <button class="btn btn-primary" 
              [disabled]="!selectedFile || loading"
              (click)="onUpload()">
        <span *ngIf="loading" class="loading loading-spinner"></span>
        {{ loading ? 'Procesando...' : 'Subir y Procesar' }}
      </button>
    </div>
  </div>
</div>
